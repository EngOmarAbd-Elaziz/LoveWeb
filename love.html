<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Message</title>
</head>

<body>
    <div id="messages">
        <div class="message">You're the sunshine of my day...</div>
        <div class="message">Every moment with you feels special...</div>
        <div class="message">I smile just thinking about you...</div>
    </div>

    <div id="question">Do you love me? ❤️</div>
    <div id="buttons">
        <button id="yesBtn" onclick="showLove()">Yes</button>
        <button id="noBtn">No</button>
    </div>
    <div id="successModal" class="modal-overlay">
        <div class="modal-card">
            <h2>I love you too ❤️</h2>
            <p style="margin-top: 15px; color: #666;">You've made me the happiest person!</p>
        </div>
    </div>
    <div class="hearts">
        
    </div>

    <link rel="stylesheet" href="love.css">
    <script src="love.js"></script>
</body>

</html>
